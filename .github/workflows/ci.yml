name: Build CarbonQT CLI (ARM64)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries (ARM64)
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          GOOS=${{ matrix.goos }} GOARCH=arm64 \
          go build -o carbonqtapp-${{ matrix.goos }}-arm64$EXT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carbonqtapp-${{ matrix.goos }}-arm64
          path: carbonqtapp-${{ matrix.goos }}-arm64*
